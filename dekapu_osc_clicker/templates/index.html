<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>统计</title>
  <style>
    :root {
      --bg: #09111f;
      --panel: rgba(16, 24, 40, 0.78);
      --panel-border: rgba(148, 163, 184, 0.14);
      --text: #e5eefc;
      --muted: #9fb0c9;
      --primary: #60a5fa;
      --primary-strong: #3b82f6;
      --accent: #34d399;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.20), transparent 28%),
        radial-gradient(circle at top right, rgba(52,211,153,0.14), transparent 24%),
        linear-gradient(180deg, #0a1221 0%, #08101d 100%);
      min-height: 100vh;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 28px; }
    .hero {
      display: flex; justify-content: space-between; gap: 16px; align-items: center;
      margin-bottom: 20px; padding: 24px 26px;
      border: 1px solid var(--panel-border); border-radius: 24px;
      background: linear-gradient(135deg, rgba(17,24,39,0.88), rgba(15,23,42,0.72));
      box-shadow: var(--shadow); backdrop-filter: blur(16px);
    }
    .hero-title { font-size: 28px; font-weight: 700; margin: 0 0 6px; }
    .hero-subtitle { color: var(--muted); margin: 0; }
    .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .nav a, .switch button {
      color: var(--text); background: rgba(51,65,85,0.68); border: 1px solid rgba(148,163,184,0.16);
      padding: 10px 15px; border-radius: 999px; cursor: pointer; text-decoration: none;
      transition: all .18s ease;
    }
    .nav a:hover, .switch button:hover { transform: translateY(-1px); background: rgba(71,85,105,0.8); }
    .switch button.active {
      background: linear-gradient(135deg, var(--primary-strong), var(--primary));
      border-color: rgba(96,165,250,0.5);
      box-shadow: 0 10px 25px rgba(59,130,246,0.28);
    }
    .summary-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; margin-bottom: 20px; }
    .card {
      background: var(--panel); border: 1px solid var(--panel-border); border-radius: 24px;
      padding: 24px; box-shadow: var(--shadow); backdrop-filter: blur(14px);
    }
    .summary-card {
      border: 1px solid rgba(148,163,184,0.14);
      background: linear-gradient(180deg, rgba(11, 19, 35, 0.88), rgba(15, 23, 42, 0.74));
    }
    .kpi-card {
      display: flex; flex-direction: column; justify-content: center;
      border: 1px solid rgba(96,165,250,0.28);
      background: linear-gradient(180deg, rgba(11, 19, 35, 0.92), rgba(15, 23, 42, 0.82));
      box-shadow: 0 0 0 1px rgba(96,165,250,0.08) inset, 0 18px 45px rgba(15, 23, 42, 0.45);
    }
    .meta-card {
      display: flex; flex-direction: column; justify-content: center;
    }
    .metric-label { color: var(--muted); font-size: 14px; }
    .metric-value {
      font-size: 52px; font-weight: 800; margin-top: 10px; letter-spacing: .5px;
      line-height: 1.1; word-break: break-all;
    }
    .metric-sub { margin-top: 12px; color: var(--muted); line-height: 1.7; }
    .hourly-credit-pill {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(52,211,153,0.30);
      background: rgba(52,211,153,0.10);
      color: #d1fae5;
      font-size: 14px;
      font-weight: 600;
      width: fit-content;
    }
    .hourly-credit-label {
      color: #9fe8cc;
      font-weight: 500;
    }
    .summary-meta {
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 999px; margin-right: 8px;
      background: var(--accent); box-shadow: 0 0 16px rgba(52,211,153,0.8);
    }
    .chart-title { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
    .chart-title h2 { margin: 0; font-size: 22px; }
    .chart-shell {
      border-radius: 20px; padding: 16px; min-height: 460px;
      background: linear-gradient(180deg, rgba(8,15,28,0.95), rgba(11,19,35,0.82));
      border: 1px solid rgba(148,163,184,0.10);
    }
    svg { width: 100%; height: 420px; display: block; }
    .empty {
      min-height: 420px; display: flex; align-items: center; justify-content: center; text-align: center;
      color: var(--muted); font-size: 16px;
      border: 1px dashed rgba(148,163,184,0.18); border-radius: 16px;
      background: rgba(15,23,42,0.45);
    }
    @media (max-width: 900px) {
      .summary-grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; align-items: flex-start; }
      .metric-value { font-size: 38px; }
    }
    @media (max-width: 640px) {
      .wrap { padding: 14px; }
      .hero {
        padding: 18px;
        border-radius: 18px;
        gap: 12px;
      }
      .hero-title { font-size: 22px; }
      .hero-subtitle { font-size: 13px; line-height: 1.6; }
      .row { gap: 10px; }
      .nav {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .nav a {
        width: 100%;
        text-align: center;
        padding: 10px 12px;
      }
      .summary-grid { gap: 14px; margin-bottom: 14px; }
      .card {
        padding: 16px;
        border-radius: 18px;
      }
      .metric-value {
        font-size: 30px;
        line-height: 1.15;
      }
      .hourly-credit-pill {
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
        text-align: center;
      }
      .chart-title {
        flex-direction: column;
        align-items: flex-start;
      }
      .chart-title h2 { font-size: 18px; }
      .switch {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .switch button {
        width: 100%;
      }
      .chart-shell {
        padding: 10px;
        min-height: 320px;
      }
      svg { height: 280px; }
      .empty {
        min-height: 280px;
        font-size: 14px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <h1 class="hero-title">实时统计面板</h1>
        <p class="hero-subtitle">自动刷新今日 credit 进度与每小时增减变化</p>
      </div>
      <div class="row nav">
        <a href="/">首页</a>
        <a href="/changes">每小时数值</a>
      </div>
    </section>

    <section class="summary-grid">
      <div class="card summary-card kpi-card">
        <div class="metric-label">今日净增 credit</div>
        <div id="totalCredit" class="metric-value">加载中...</div>
        <div id="hourlyCreditGain" class="hourly-credit-pill">
          <span class="hourly-credit-label">本小时增量</span>
          <span id="hourlyCreditValue">--</span>
        </div>
      </div>

      <div class="card summary-card meta-card">
        <div id="summaryMeta" class="summary-meta"></div>
        <div id="lastUpdated" class="metric-sub"><span class="status-dot"></span>最后更新时间：--</div>
      </div>
    </section>

    <section>
      <div class="card">
        <div class="chart-title">
          <h2>每小时 credit 增减</h2>
          <div class="row switch">
            <button id="barBtn" class="active">柱状图</button>
            <button id="lineBtn">折线图</button>
          </div>
        </div>
        <div class="chart-shell">
          <svg id="chart" viewBox="0 0 1000 420" preserveAspectRatio="none"></svg>
          <div id="chartEmpty" class="empty" style="display:none;">暂无统计数据，等待新日志...</div>
        </div>
      </div>
    </section>
  </div>
  <script>
    let chartMode = 'bar';
    let isRefreshing = false;
    let currentTotalCredit = 0;

    function formatNumber(value) {
      return new Intl.NumberFormat('zh-CN').format(Number(value || 0));
    }

    function animateNumber(elementId, fromValue, toValue, duration = 600) {
      const element = document.getElementById(elementId);
      const start = performance.now();
      const startValue = Number(fromValue || 0);
      const endValue = Number(toValue || 0);

      function frame(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const value = Math.round(startValue + (endValue - startValue) * eased);
        element.textContent = formatNumber(value);
        if (progress < 1) {
          requestAnimationFrame(frame);
        }
      }

      requestAnimationFrame(frame);
    }

    function updateLastUpdated() {
      const now = new Date();
      document.getElementById('lastUpdated').innerHTML = `<span class="status-dot"></span>最后更新时间：${now.toLocaleTimeString('zh-CN')}`;
    }

    function setMode(mode) {
      chartMode = mode;
      document.getElementById('barBtn').classList.toggle('active', mode === 'bar');
      document.getElementById('lineBtn').classList.toggle('active', mode === 'line');
      refreshDashboard();
    }

    function getChartMetrics(rows) {
      const values = rows.map(row => Number(row.credit || 0));
      const minValue = Math.min(...values, 0);
      const maxValue = Math.max(...values, 0);
      return { minValue, maxValue };
    }

    function getYPosition(value, padding, innerHeight, minValue, maxValue) {
      return padding + (maxValue - value) / Math.max(maxValue - minValue, 1) * innerHeight;
    }

    function formatAxisValue(value) {
      const absValue = Math.abs(Number(value || 0));
      if (absValue >= 100000000) {
        return `${(value / 100000000).toFixed(absValue >= 1000000000 ? 0 : 1).replace(/\.0$/, '')}亿`;
      }
      if (absValue >= 10000) {
        return `${(value / 10000).toFixed(absValue >= 100000 ? 0 : 1).replace(/\.0$/, '')}万`;
      }
      return formatNumber(Math.round(value));
    }

    function buildYAxis(width, padding, innerHeight, minValue, maxValue) {
      const ticks = 5;
      const labels = [];
      for (let i = 0; i < ticks; i += 1) {
        const ratio = i / (ticks - 1);
        const value = maxValue - (maxValue - minValue) * ratio;
        const y = padding + innerHeight * ratio;
        labels.push({ value, y });
      }
      return labels.map(({ value, y }) => (
        `<text x="${padding - 10}" y="${y + 4}" fill="#94a3b8" font-size="11" text-anchor="end">${formatAxisValue(value)}</text>`
      )).join('');
    }

    async function loadSummary() {
      const [summaryResponse, hourlyResponse] = await Promise.all([
        fetch('/api/today-summary'),
        fetch('/api/hourly-credit'),
      ]);
      const data = await summaryResponse.json();
      const hourlyData = await hourlyResponse.json();
      const nextTotalCredit = Number(data.total_credit_gained || 0);
      animateNumber('totalCredit', currentTotalCredit, nextTotalCredit);
      currentTotalCredit = nextTotalCredit;

      const hourlyRows = hourlyData.rows || [];
      const currentHour = new Date().getHours().toString().padStart(2, '0') + ':00';
      const currentHourRow = hourlyRows.find(row => row.hour === currentHour);
      const currentHourGain = Number((currentHourRow && currentHourRow.credit) || 0);
      document.getElementById('hourlyCreditValue').textContent = currentHourGain > 0
        ? `+${formatNumber(currentHourGain)}`
        : formatNumber(currentHourGain);

      document.getElementById('summaryMeta').innerHTML = `快照 ${data.snapshot_count || 0} 条<br>首条：${data.first_captured_at || '--'}<br>末条：${data.last_captured_at || '--'}`;
      return data;
    }

    function renderBarChart(rows) {
      const svg = document.getElementById('chart');
      const width = 1000;
      const height = 420;
      const padding = 42;
      const { minValue, maxValue } = getChartMetrics(rows);
      const innerWidth = width - padding * 2;
      const innerHeight = height - padding * 2;
      const barWidth = innerWidth / rows.length;
      const zeroY = getYPosition(0, padding, innerHeight, minValue, maxValue);
      let out = `
        <defs>
          <linearGradient id="barGradientPositive" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#60a5fa" />
            <stop offset="100%" stop-color="#2563eb" />
          </linearGradient>
          <linearGradient id="barGradientNegative" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fb7185" />
            <stop offset="100%" stop-color="#e11d48" />
          </linearGradient>
        </defs>
      `;
      for (let i = 0; i < 5; i += 1) {
        const y = padding + (innerHeight / 4) * i;
        out += `<line x1="${padding}" y1="${y}" x2="${width-padding}" y2="${y}" stroke="rgba(148,163,184,0.12)" />`;
      }
      out += buildYAxis(width, padding, innerHeight, minValue, maxValue);
      out += `<line x1="${padding}" y1="${zeroY}" x2="${width-padding}" y2="${zeroY}" stroke="rgba(226,232,240,0.35)" stroke-width="1.5" />`;
      rows.forEach((row, index) => {
        const value = Number(row.credit || 0);
        const x = padding + index * barWidth + 5;
        const valueY = getYPosition(value, padding, innerHeight, minValue, maxValue);
        const rectY = Math.min(valueY, zeroY);
        const rectHeight = Math.max(Math.abs(zeroY - valueY), 2);
        const labelX = x + Math.max(barWidth - 10, 10) / 2;
        const fill = value >= 0 ? 'url(#barGradientPositive)' : 'url(#barGradientNegative)';
        out += `<rect x="${x}" y="${rectY}" width="${Math.max(barWidth - 10, 10)}" height="${rectHeight}" fill="${fill}" rx="8" />`;
        out += `<text x="${labelX}" y="${height-padding+18}" fill="#94a3b8" font-size="10" text-anchor="middle">${row.hour.slice(0,2)}</text>`;
      });
      svg.innerHTML = out;
    }

    function renderLineChart(rows) {
      const svg = document.getElementById('chart');
      const width = 1000;
      const height = 420;
      const padding = 42;
      const { minValue, maxValue } = getChartMetrics(rows);
      const innerWidth = width - padding * 2;
      const innerHeight = height - padding * 2;
      const stepX = innerWidth / Math.max(rows.length - 1, 1);
      const zeroY = getYPosition(0, padding, innerHeight, minValue, maxValue);
      const points = rows.map((row, index) => {
        const x = padding + index * stepX;
        const y = getYPosition(Number(row.credit || 0), padding, innerHeight, minValue, maxValue);
        return { x, y, label: row.hour.slice(0,2) };
      });
      let out = `
        <defs>
          <linearGradient id="lineArea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(52,211,153,0.35)" />
            <stop offset="100%" stop-color="rgba(52,211,153,0.02)" />
          </linearGradient>
        </defs>
      `;
      for (let i = 0; i < 5; i += 1) {
        const y = padding + (innerHeight / 4) * i;
        out += `<line x1="${padding}" y1="${y}" x2="${width-padding}" y2="${y}" stroke="rgba(148,163,184,0.12)" />`;
      }
      out += buildYAxis(width, padding, innerHeight, minValue, maxValue);
      out += `<line x1="${padding}" y1="${zeroY}" x2="${width-padding}" y2="${zeroY}" stroke="rgba(226,232,240,0.35)" stroke-width="1.5" />`;
      const areaPoints = [`${padding},${zeroY}`, ...points.map(p => `${p.x},${p.y}`), `${width-padding},${zeroY}`].join(' ');
      out += `<polygon fill="url(#lineArea)" points="${areaPoints}" />`;
      out += `<polyline fill="none" stroke="#34d399" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" points="${points.map(p => `${p.x},${p.y}`).join(' ')}" />`;
      points.forEach(point => {
        out += `<circle cx="${point.x}" cy="${point.y}" r="4.5" fill="#34d399" />`;
        out += `<circle cx="${point.x}" cy="${point.y}" r="10" fill="rgba(52,211,153,0.10)" />`;
        out += `<text x="${point.x}" y="${height-padding+18}" fill="#94a3b8" font-size="10" text-anchor="middle">${point.label}</text>`;
      });
      svg.innerHTML = out;
    }

    async function loadChart() {
      const response = await fetch('/api/hourly-credit');
      const data = await response.json();
      const rows = data.rows || [];
      const hasData = rows.some(row => Number(row.credit || 0) !== 0);
      document.getElementById('chart').style.display = hasData ? 'block' : 'none';
      document.getElementById('chartEmpty').style.display = hasData ? 'none' : 'flex';
      if (!hasData) {
        return;
      }
      if (chartMode === 'line') {
        renderLineChart(rows);
      } else {
        renderBarChart(rows);
      }
    }

    async function refreshDashboard() {
      if (isRefreshing) {
        return;
      }
      isRefreshing = true;
      try {
        await Promise.all([loadSummary(), loadChart()]);
        updateLastUpdated();
      } finally {
        isRefreshing = false;
      }
    }

    document.getElementById('barBtn').addEventListener('click', () => setMode('bar'));
    document.getElementById('lineBtn').addEventListener('click', () => setMode('line'));
    refreshDashboard();
    setInterval(refreshDashboard, 3000);
  </script>
</body>
</html>
