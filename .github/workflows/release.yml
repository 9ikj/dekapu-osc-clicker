name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v1.0.0)
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate app icons
        shell: pwsh
        run: python tools/generate_icon.py

      - name: Compile source
        shell: pwsh
        run: python -m compileall dekapu_osc_clicker dekapu_osc_clicker.py tools/generate_icon.py

      - name: Smoke test stats modules
        shell: pwsh
        run: |
          python -c "from pathlib import Path; from dekapu_osc_clicker.dsm_parser import extract_payload_from_generated_url; from dekapu_osc_clicker.stats_store import StatsStore; url = Path('example_data.txt').read_text(encoding='utf-8').splitlines()[0].strip(); payload = extract_payload_from_generated_url(url); required = ['credit', 'credit_all', 'sp', 'sp_use']; missing = [key for key in required if key not in payload]; assert not missing, missing; store = StatsStore(Path('build') / 'workflow-smoke-test.db'); store.record_payload(payload, source_log_file='example_data.txt', source_url=url); summary = store.get_today_summary(); assert 'total_credit_gained' in summary"

      - name: Verify generated assets
        shell: pwsh
        run: |
          $requiredFiles = @(
            "dekapu_osc_clicker/assets/sp_assistant_icon.png",
            "dekapu_osc_clicker/assets/sp_assistant_icon.ico"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Missing required asset: $file"
            }
          }

      - name: Build executable
        shell: pwsh
        run: ./build.ps1 -Version "${{ github.event.inputs.tag }}"

      - name: Verify packaged executable exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/dekapu-osc-clicker.exe")) {
            throw "Missing packaged executable"
          }

      - name: Rename executable for release
        shell: pwsh
        run: |
          Rename-Item -Path "dist/dekapu-osc-clicker.exe" -NewName "dekapu-osc-clicker-${{ github.event.inputs.tag }}-windows.exe"

      - name: Generate release notes body
        id: release_notes
        shell: pwsh
        run: |
          $currentTag = "${{ github.event.inputs.tag }}"
          $previousTag = git tag --sort=-v:refname | Where-Object { $_ -ne $currentTag } | Select-Object -First 1

          if ($previousTag) {
            $compareRange = "$previousTag..HEAD"
            $header = "## Changes since $previousTag"
          }
          else {
            $compareRange = "HEAD"
            $header = "## Changes"
          }

          $changes = git log $compareRange --pretty=format:"- %h %s%n"
          $changes = ($changes | Out-String).Trim()
          if (-not $changes) {
            $changes = "- No changes found"
          }

          @"
          $header

          $changes
          "@ | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: dekapu-osc-clicker ${{ github.event.inputs.tag }}
          body_path: release-notes.md
          files: dist/dekapu-osc-clicker-${{ github.event.inputs.tag }}-windows.exe
